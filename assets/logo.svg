<?xml version="1.0" encoding="UTF-8"?>
<!--
  Anvilshare - Wordmark
  Anvilshare twist: lowercase all-one-word, heavy display weight,
  ember accent bar under the 'v' like a forge spark. Near-black ground.
  Palette: Off-white on Forge Dark. Iron glow (amber) accent.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="560" height="140" role="img" aria-label="anvilshare">
  <style>
    .forge   { fill: #14120F; }
    .chalk   { fill: #F2EFEA; }
    .iron    { fill: #D98A2B; }
    .steel   { fill: #3A3833; }
    .display { font-family: "Source Serif 4", "Fraunces", Georgia, serif; font-weight: 700; }
    .body    { font-family: "Inter", system-ui, sans-serif; font-weight: 500; letter-spacing: 0.32em; }
  </style>
  <rect class="forge" width="560" height="140"/>
  <!-- wordmark: all lowercase, heavy serif -->
  <text class="display chalk" x="280" y="80" font-size="56" text-anchor="middle" letter-spacing="-0.015em">anvilshare</text>
  <!-- ember bar: the forge spark under the mark -->
  <rect class="iron" x="200" y="96" width="160" height="4"/>
  <!-- thin steel rule across the top - structural -->
  <line x1="40" y1="28" x2="520" y2="28" stroke="#3A3833" stroke-width="1"/>
  <!-- subline in mono-adjacent tight tracking -->
  <text class="body chalk" x="280" y="120" font-size="10" text-anchor="middle" opacity="0.7">THE REPLACEMENT STUDIO</text>
</svg>
